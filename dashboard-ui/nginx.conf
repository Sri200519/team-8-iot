server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location /api/ingestion/ {
    proxy_pass http://ingestion:3001/;
  }

  location /api/dashboard/ {
    proxy_pass http://dashboard-api:3000/;
  }

  location /api/sensor-registry/ {
    proxy_pass http://sensor-registry-service:3000/;
  }

  location /api/alerts/ {
    proxy_pass http://alert-service:3000/;
  }

  location /api/anomaly/ {
    proxy_pass http://anomaly-worker:3002/;
  }

}
