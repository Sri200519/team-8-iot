  #     retries: 3
  #     start_period: 15s
  #
  # ── Postgres template ──────────────────────────────────────────────────────
  #
  # postgres:
  #   image: postgres:16
  #   container_name: postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: pass
  #     POSTGRES_DB: mydb
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - team-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #
  # ── Redis template ─────────────────────────────────────────────────────────
  #
  # redis:
  #   image: redis:7
  #   container_name: redis
  #   restart: unless-stopped
  #   networks:
  #     - team-net
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

# ── Named volumes ──────────────────────────────────────────────────────────────
# Declare a volume for each database here, e.g.:
#
volumes:
  readings-data:
  sensor-registry-data:
  alert-data:
  report-data:
  device-data:
