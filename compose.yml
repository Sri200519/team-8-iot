# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
#
# This file defines the Holmes investigation container and a shared network.
# Add your own services below the "Add your services here" section.
#
# Every service you add must be attached to `team-net` so it is reachable
# from holmes by service name.
#
# Quick reference:
#   Start everything:          docker compose up --build
#   Open a shell in holmes:    docker compose exec holmes bash
#   View logs:                 docker compose logs -f
#   Check health:              docker compose ps
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

services:

  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color
# Holmes has no ports — access it via: docker compose exec holmes bash

# ── Ingestion Service ──────────────────────────────────────────────────────
  ingestion:
    build: ./ingestion
    container_name: ingestion-service
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "3001:3001"
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# ── Dashboard API ──────────────────────────────────────────────────────
  dashboard-api:
    build: ./dashboard-api
    container_name: dashboard-api
    restart: unless-stopped
    depends_on:
      - readings
      - redis
    ports:
      - "3000:3000"
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s


# ── Readings Database ──────────────────────────────────────────────────────
  readings:
    image: postgres:16
    container_name: readings
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: readings-db
    volumes:
      - readings-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d readings-db"]
      interval: 5s
      timeout: 3s
      retries: 5

# ── Sensor Registry Database ──────────────────────────────────────────────────────
  sensor-registry:
    image: postgres:16
    container_name: sensor-registry
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: sensor-registry-db
    volumes:
      - sensor-registry-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sensor-registry-db"]
      interval: 5s
      timeout: 3s
      retries: 5

# ── Alert Database ──────────────────────────────────────────────────────
  alert:
    image: postgres:16
    container_name: alert
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: alert-db
    volumes:
      - alert-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d alert-db"]
      interval: 5s
      timeout: 3s
      retries: 5

# ── Report Database ──────────────────────────────────────────────────────
  report:
    image: postgres:16
    container_name: report
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: report-db
    volumes:
      - report-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d report-db"]
      interval: 5s
      timeout: 3s
      retries: 5

# ── Device Database ──────────────────────────────────────────────────────
  device:
    image: postgres:16
    container_name: device
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: device-db
    volumes:
      - device-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d device-db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Add your services here ─────────────────────────────────────────────────
  #
  # Pattern for each service:
  #
  # your-service:
  #   build: ./your-service
  #   container_name: your-service
  #   restart: unless-stopped
  #   ports:
  #     - "3001:3001"          # expose on host for local testing
  #   networks:
  #     - team-net             # REQUIRED — makes it reachable from holmes
  #   environment:
  #     - DATABASE_URL=postgres://user:pass@postgres:5432/yourdb
  #     - REDIS_URL=redis://redis:6379
